<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Rock-Paper-Scissors" />
    <meta
      property="og:description"
      content="A simple Rock-Paper-Scissors game that displays the winner when a player gets a score of 20"
    />
    <meta
      property="og:image"
      content="https://t4.ftcdn.net/jpg/00/84/60/25/240_F_84602505_CbgZtlxEktGN0wfLfTQMuRNvBau4mujo.jpg"
    />
    <meta
      property="og:url"
      content="https://rock-paper-scissors-gee.vercel.app/"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:type" content="website" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <span class="day">
      <img class="moon" src="moon.svg" alt="Night" />
      <img class="sun hidden" src="sunny-outline.svg" alt="Day" />
    </span>
    <main class="container">
      <h1>Rock Paper Scissors</h1>

      <div class="score-board">
        <div class="score score-u">
          <h3 class="u-win">Your Score</h3>
          <div class="user-score">
            <p class="score-number user-score-number">0</p>
          </div>
        </div>
        <div class="score score-c">
          <h3 class="c-win">Computer Score</h3>
          <div class="computer-score">
            <p class="score-number computer-score-number">0</p>
            <span class="emoji"></span>
          </div>
        </div>
      </div>
      <div class="computer-board">
        <div class="score">
          <h3 class="ready">Rock,Paper,Scissors...</h3>
          <button class="computer-option" title="Scissors">✂️</button>
        </div>
      </div>

      <div class="choices">
        <button class="choice-btn rock" title="Rock">🪨</button>
        <button class="choice-btn paper" title="Paper">📄</button>
        <button class="choice-btn scissors" title="Scissors">✂️</button>
      </div>
      <div class="go-btn">
        <button class="go" title="Scissors">Go</button>
      </div>
      <div class="result">
        <div class="result-text">Make your choice</div>
        <div class="result-detail">
          Click on Go and choose between rock, paper, or scissors. winner to
          reach 20 points
        </div>
      </div>

      <button class="reset-btn">Reset Game</button>
    </main>
    <script defer src="index.js"></script>
  </body>
</html>
